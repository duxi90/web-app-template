name: Deploy (SSR / Cloudflare Workers)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-ssr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: ${{ github.event_name == 'push' && 'Production' || 'Preview' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build content
        run: bun run --filter "{{PACKAGE_SCOPE}}/content" build || true

      - name: OpenNext build
        run: bun run --filter web-ssr build:cf

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web-ssr
          command: ${{ github.event_name == 'push' && 'deploy' || format('versions upload --preview-alias={0}', github.head_ref) }}
