name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

  test-and-lint:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build content (Velite)
        run: bun run --filter @repo/content build

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  bootstrap-fixtures:
    name: Bootstrap fixture (${{ matrix.fixture }})
    runs-on: ubuntu-latest
    needs: test-and-lint
    strategy:
      fail-fast: false
      matrix:
        fixture: [static-minimal, ssr-full, blank-ssr]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install seed dependencies
        run: bun install --frozen-lockfile

      - name: Apply fixture to a temp target
        run: |
          target=$(mktemp -d)
          extra_args=""
          if [[ "${{ matrix.fixture }}" == blank-* ]]; then
            extra_args="--blank"
          fi
          # shellcheck disable=SC2086
          bun run scripts/bootstrap-apply.ts \
            --fixture "init/test-fixtures/${{ matrix.fixture }}.yaml" \
            --target "$target" \
            --no-commit \
            $extra_args
          echo "TARGET=$target" >> "$GITHUB_ENV"

      - name: Sanity-check the assembled target
        run: |
          test ! -d "$TARGET/init"
          test ! -f "$TARGET/INIT.md"
          test ! -d "$TARGET/.claude/commands"
          test -f "$TARGET/.bootstrap.yaml"
          # No remaining {{TOKEN}} placeholders.
          if grep -r --include='*.json' --include='*.ts' --include='*.tsx' --include='*.mjs' --include='*.css' --include='*.toml' --include='*.tf' --include='*.yml' '{{[A-Z_]\+}}' "$TARGET"; then
            echo "Unsubstituted placeholder leak"; exit 1
          fi

      - name: Install in target
        working-directory: ${{ env.TARGET }}
        run: bun install

      - name: Build content (if Velite)
        working-directory: ${{ env.TARGET }}
        run: |
          if [ -f packages/content/velite.config.ts ]; then
            bun run --filter '*/content' build
          fi

      - name: Typecheck + lint + build in target
        working-directory: ${{ env.TARGET }}
        run: |
          bun run typecheck
          bun run lint
          bun run build
